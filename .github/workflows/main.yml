name: Build and Deploy Zola Sites

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zola
        run: |
          curl -sSL https://github.com/getzola/zola/releases/download/v0.20.0/zola-v0.20.0-x86_64-unknown-linux-gnu.tar.gz | tar -xz
          sudo mv zola /usr/local/bin/zola

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Python deps
        run: |
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          uv add pydantic toolz

      - name: Generate markdown from completions
        run: |
          uv run python iplayed_cli/completions_to_markdown.py \
            --completions ./iplayed_cli/data/completions.json \
            --target-dir ./iplayed_ssg/content/games

      - name: Build iplayed_ssg
        run: |
          zola --root iplayed_ssg build
          mkdir -p dist
          cp -r iplayed_ssg/public/* dist/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
